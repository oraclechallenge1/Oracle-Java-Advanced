## Arquivo de pipeline do Azure DevOps para sincronizar o repositório do Azure com o GitHub

trigger:
  - main

variables:
  - group: github-sync

pool:
  vmImage: ubuntu-latest

steps:
  - checkout: self
    persistCredentials: true

  - script: |
      git config --global user.email "azuredevops@local"
      git config --global user.name "Azure DevOps"
      
      git remote add github https://$(GITHUB_USER):$(GITHUB_TOKEN)@github.com/oraclechallenge1/Oracle-Java-Advanced.git
      
      git push github HEAD:refs/heads/main --force
    displayName: 'Sync Azure Repo para GitHub'